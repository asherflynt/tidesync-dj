name: TideSync DJ
version: "0.4.7"
slug: tidesync_dj
description: AI-powered Tidal DJ using Music Assistant and Claude
url: https://github.com/asherflynt/tidesync-dj/tree/main/tidesync_dj
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:music-note-bluetooth
panel_title: TideSync DJ
# Only the Core REST API is needed (states + events). We deliberately do NOT
# request hassio_api / host access — least privilege.
homeassistant_api: true
options:
  anthropic_api_key: ""
  claude_model: "claude-sonnet-4-6"
  ma_host: "homeassistant.local"
  ma_port: 8095
  dj_tick_interval: 30
  skip_penalty_seconds: 60
  ma_username: ""
  ma_password: ""
  ma_token: ""
  vibe_input_text_entity: ""
  tidal_provider: "tidal"
schema:
  anthropic_api_key: str
  claude_model: list(claude-sonnet-4-6|claude-opus-4-8|claude-haiku-4-5)
  ma_host: str
  ma_port: int
  ma_username: str?
  ma_password: password?
  ma_token: password?
  dj_tick_interval: int
  skip_penalty_seconds: int
  vibe_input_text_entity: str?
  tidal_provider: str?
