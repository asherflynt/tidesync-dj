name: TideSync DJ
version: "1.3.0"
slug: tidesync_dj
description: AI-powered DJ for any Music Assistant source, powered by Claude
url: https://github.com/asherflynt/tidesync-dj/tree/main/tidesync_dj
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:disc-player
panel_title: TideSync DJ
# Only the Core REST API is needed (states + events). We deliberately do NOT
# request hassio_api / host access — least privilege.
homeassistant_api: true
options:
  anthropic_api_key: ""
  claude_model: "claude-sonnet-4-6"
  ma_host: "homeassistant.local"
  ma_port: 8095
  dj_tick_interval: 30
  ma_username: ""
  ma_password: ""
  ma_token: ""
  vibe_input_text_entity: ""
  playlist_provider: ""
  weather_entity: ""
  temperature_entity: ""
  ha_action_entity: ""
  sonic_features: true
  getsongbpm_api_key: ""
  harmonic_sort: false
schema:
  anthropic_api_key: str
  claude_model: list(claude-sonnet-4-6|claude-opus-4-8|claude-haiku-4-5)
  ma_host: str
  ma_port: int
  ma_username: str?
  ma_password: password?
  ma_token: password?
  dj_tick_interval: int
  vibe_input_text_entity: str?
  playlist_provider: str?
  weather_entity: str?
  temperature_entity: str?
  ha_action_entity: str?
  # Ground track sequencing in real BPM/key looked up by ISRC (free sources).
  sonic_features: bool?
  # Optional GetSongBPM API key — enables an extra BPM/key fallback source.
  getsongbpm_api_key: str?
  # Reorder each resolved block by Camelot/tempo adjacency before queueing.
  harmonic_sort: bool?
  # Deprecated alias for playlist_provider; honoured if present on upgrade.
  tidal_provider: str?
